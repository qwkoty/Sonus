services:
  - type: web
    name: sonus
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://sonus.onrender.com
      - key: APP_ID
        sync: false
      - key: APP_KEY
        sync: false
